<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MiniScape — OSRS Map Reference</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: 'Courier New', monospace; }
  #map { width: 100vw; height: 100vh; background: #000; }
  #coords {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(59,50,38,0.92); color: #ff981f; font-size: 13px;
    padding: 6px 14px; border: 2px solid #3e3529; border-radius: 3px; z-index: 1000;
    pointer-events: none;
  }
  #info {
    position: fixed; top: 10px; left: 10px;
    background: rgba(59,50,38,0.92); color: #ff981f; font-size: 12px;
    padding: 8px 12px; border: 2px solid #3e3529; border-radius: 3px; z-index: 1000;
    max-width: 260px; line-height: 1.5;
  }
  #info a { color: #ffff00; }
  #info kbd { background: #555; color: #fff; padding: 1px 5px; border-radius: 2px; font-size: 11px; }
  .leaflet-container { background: #000 !important; }
  /* Grid overlay styling */
  .grid-label {
    font-size: 10px; color: rgba(255,255,255,0.5); font-family: monospace;
    text-shadow: 1px 1px 2px #000;
  }
  /* Our game world boundary */
  .game-bounds { border: 2px dashed #ff981f !important; }
</style>
</head>
<body>
<div id="map"></div>
<div id="coords">OSRS: (—, —) | Game: (—, —)</div>
<div id="info">
  <strong style="color:#ffff00">OSRS Map Reference</strong><br>
  Scroll to zoom, drag to pan<br>
  <kbd>G</kbd> Toggle grid<br>
  Orange dashed box = our game world<br>
  Game tile (100,100) = Lumbridge
</div>

<script>
// Our game coordinate mapping
const WORLD_W = 200, WORLD_H = 200;
const OSRS_ORIGIN_X = 3222 - 100; // game x=0 -> OSRS 3122
const OSRS_ORIGIN_Y = 3218 + 100; // game y=0 -> OSRS 3318

function toOsrs(gx, gy) { return { ox: OSRS_ORIGIN_X + gx, oy: OSRS_ORIGIN_Y - gy }; }
function toGame(ox, oy) { return { gx: ox - OSRS_ORIGIN_X, gy: OSRS_ORIGIN_Y - oy }; }

// Custom CRS: OSRS coords map 1:1, y-up
const RS_CRS = L.Util.extend({}, L.CRS.Simple, {
  transformation: new L.Transformation(1, 0, -1, 0) // flip y so north is up
});

// Init map centered on Lumbridge
const map = L.map('map', {
  crs: RS_CRS,
  center: [3218, 3222], // [y, x] in Leaflet = [lat, lng]
  zoom: 2,
  minZoom: -4,
  maxZoom: 8,
  zoomControl: true,
  attributionControl: false,
});

// OSRS map tiles from mejrs
L.TileLayer.OSRS = L.TileLayer.extend({
  getTileUrl: function(coords) {
    const z = coords.z;
    const fileX = coords.x;
    const fileY = -(1 + coords.y);
    return `https://raw.githubusercontent.com/mejrs/layers_osrs/refs/heads/master/mapsquares/-1/${z}/0_${fileX}_${fileY}.png`;
  },
  createTile: function(coords, done) {
    const tile = L.TileLayer.prototype.createTile.call(this, coords, done);
    tile.onerror = function() {
      tile.src = ''; // suppress 404 errors for missing tiles
      done(null, tile);
    };
    return tile;
  }
});

new L.TileLayer.OSRS('', {
  minZoom: -4,
  maxNativeZoom: 4,
  maxZoom: 8,
  tileSize: 256,
  errorTileUrl: '',
}).addTo(map);

// Game world boundary rectangle
const sw = toOsrs(0, WORLD_H - 1);     // bottom-left of game world
const ne = toOsrs(WORLD_W - 1, 0);     // top-right of game world
const bounds = L.latLngBounds(
  [sw.oy, sw.ox], // south-west
  [ne.oy, ne.ox]  // north-east
);
const boundsRect = L.rectangle(bounds, {
  color: '#ff981f',
  weight: 2,
  fill: false,
  dashArray: '8 4',
  className: 'game-bounds',
}).addTo(map);

// Lumbridge marker
L.circleMarker([3218, 3222], {
  radius: 6, color: '#ff0', fillColor: '#ff0', fillOpacity: 0.8, weight: 2,
}).addTo(map).bindTooltip('Lumbridge (100, 100)', {
  permanent: false, direction: 'top', className: 'grid-label'
});

// Coordinate display
const coordsEl = document.getElementById('coords');
map.on('mousemove', function(e) {
  const ox = Math.round(e.latlng.lng);
  const oy = Math.round(e.latlng.lat);
  const g = toGame(ox, oy);
  const inBounds = g.gx >= 0 && g.gx < WORLD_W && g.gy >= 0 && g.gy < WORLD_H;
  coordsEl.textContent = `OSRS: (${ox}, ${oy}) | Game: (${g.gx}, ${g.gy})${inBounds ? '' : ' [outside]'}`;
});

// Grid toggle
let gridLayer = null;
let showGrid = false;

function createGrid() {
  if (gridLayer) { map.removeLayer(gridLayer); gridLayer = null; }
  const group = L.layerGroup();
  const z = map.getZoom();
  if (z < 0) return group.addTo(map); // too zoomed out for grid

  const b = map.getBounds();
  const step = z >= 3 ? 1 : z >= 1 ? 8 : 64;
  const minX = Math.floor(b.getWest() / step) * step;
  const maxX = Math.ceil(b.getEast() / step) * step;
  const minY = Math.floor(b.getSouth() / step) * step;
  const maxY = Math.ceil(b.getNorth() / step) * step;

  const opacity = z >= 3 ? 0.15 : 0.25;
  const lineOpts = { color: '#fff', weight: 0.5, opacity: opacity };

  for (let x = minX; x <= maxX; x += step) {
    group.addLayer(L.polyline([[minY, x], [maxY, x]], lineOpts));
  }
  for (let y = minY; y <= maxY; y += step) {
    group.addLayer(L.polyline([[y, minX], [y, maxX]], lineOpts));
  }
  gridLayer = group.addTo(map);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'g' || e.key === 'G') {
    showGrid = !showGrid;
    if (showGrid) { createGrid(); }
    else if (gridLayer) { map.removeLayer(gridLayer); gridLayer = null; }
  }
});

map.on('moveend zoomend', () => { if (showGrid) createGrid(); });
</script>
</body>
</html>
