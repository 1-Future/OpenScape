// Parse CSV
function parseCSV(text) {
  const rows = [];
  const lines = text.trim().split('\n');
  for (let i = 1; i < lines.length; i++) {
    const match = lines[i].match(/^([^,]*),([^,]*),([^,]*),"?([^"]*)"?$/);
    if (match) {
      const items = match[4].split(',').map(s => s.trim());
      rows.push({ category: match[1], subcategory: match[2], subsub: match[3], items });
    }
  }
  return rows;
}

const data = parseCSV(csv);
let totalItems = 0;
data.forEach(r => totalItems += r.items.length);

// Group by category
const categories = {};
for (const row of data) {
  if (!categories[row.category]) categories[row.category] = {};
  if (!categories[row.category][row.subcategory]) categories[row.category][row.subcategory] = [];
  categories[row.category][row.subcategory].push(row);
}

function render(filter = '') {
  const f = filter.toLowerCase();
  let html = '';
  let shown = 0, total = 0;

  for (const [cat, subs] of Object.entries(categories)) {
    let catHtml = '';
    let catCount = 0;
    for (const [sub, rows] of Object.entries(subs)) {
      let subHtml = '';
      for (const row of rows) {
        const filtered = row.items.filter(item => !f || item.toLowerCase().includes(f));
        total += row.items.length;
        shown += filtered.length;
        if (filtered.length === 0) continue;
        subHtml += '<div class="sub-sub"><h4>' + row.subsub + '</h4><div class="items">';
        for (const item of filtered) {
          subHtml += '<span class="item">' + item + '</span>';
          catCount++;
        }
        subHtml += '</div></div>';
      }
      if (subHtml) {
        catHtml += '<div class="subcategory"><h3>' + sub + '</h3>' + subHtml + '</div>';
      }
    }
    if (catHtml) {
      html += '<div class="category"><h2>' + cat + ' <span class="count">(' + catCount + ')</span></h2>' + catHtml + '</div>';
    }
  }

  document.getElementById('content').innerHTML = html;
  document.getElementById('stats').textContent = f
    ? 'Showing ' + shown + ' of ' + totalItems + ' items matching "' + filter + '"'
    : totalItems + ' items across ' + Object.keys(categories).length + ' categories';
}

function filterItems(value) { render(value); }
render();
